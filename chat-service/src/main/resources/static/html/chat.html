<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITBook Chat</title>
    <link rel="icon" href="../../img/logowhite.png" type="image/png"/>
    <link rel="stylesheet" href="../../css/chat.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<noscript>
    <div class="no-script">
        <h2>JavaScript Required</h2>
        <p>Please enable JavaScript to use ITBook Chat</p>
    </div>
</noscript>

<!-- Username Modal -->
<div id="username-page" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <img src="../../img/logo.png" alt="ITBook Logo" class="logo">
            <h1>ITBook Chat</h1>
            <p>Connect with your community</p>
        </div>
        <form id="usernameForm">
            <input type="text" id="name" placeholder="Enter your username" class="username-input" autocomplete="off" required>
            <button type="submit" class="btn-primary">Start Chatting</button>
        </form>
    </div>
</div>

<!-- Chat Page -->
<div id="chat-page" class="hidden">
    <div class="chat-wrapper">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <div class="header-title">
                    <h2>Community Chat</h2>
                    <span class="header-status" id="header-status">Connecting...</span>
                </div>
            </div>
            <div class="header-right">
                <button id="logout-btn" class="btn-icon" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>

        <!-- Messages Container -->
        <div id="messageArea" class="message-area"></div>

        <!-- Input Form -->
        <form id="messageForm" class="message-form">
            <div class="input-wrapper">
                <textarea id="message" placeholder="Type a message..." class="message-input" autocomplete="off"></textarea>
                <button type="submit" class="btn-send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="../../js/chat.js"></script>
</body>
</html>
