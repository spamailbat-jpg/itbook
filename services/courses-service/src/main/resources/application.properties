spring.application.name=courses-service

# MySQL JDBC Config
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/itbook_db
spring.datasource.username=devlepmentBat
spring.datasource.password=12345678

# Hibernate (JPA) Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Server Config
server.port=8003

# Eureka Config
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
server.servlet.cors.allowed-origins=http://localhost:8000
server.servlet.cors.allowed-methods=GET,POST,PUT,DELETE
server.servlet.cors.allow-credentials=true
user.service.base-url=http://localhost:8001