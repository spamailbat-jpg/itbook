spring.application.name=user-service
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# MySQL JDBC Config
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/itbook_db
spring.datasource.username=devlepmentBat
spring.datasource.password=12345678

# Hibernate (JPA) Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Config
server.port=8001
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

#spring.session.store-type=redis
#spring.redis.host=localhost
#spring.redis.port=6379

app.upload.dir=services/user-service/uploads/
spring.web.resources.static-locations=classpath:/static/,file:./services/user-service/uploads/

# JWT secret (must be the same across all user-service instances)
app.jwt.secret=itbook-super-secret-key-for-jwt-2026-please-change

courses.service.base-url=http://localhost:8003