<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/img/logowhite.png" type="image/png"/>
  <link rel="stylesheet" href="/css/login.css">
  <title>Reset Password - ITBook</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body data-page="reset">
<div class="align">
  <nav class="navbar">
    <div class="logo"><img src="/img/logowhite.png" alt="Logo"></div>
    <div class="site-name">
      <text>Recover your account securely.<br>Enter your email and choose a new password.</text>
    </div>
  </nav>
  <div><img src="/img/collage.jpg" alt="IT collage" class="Background-image"></div>

  <div class="card">
    <div class="head">
      <div></div>
      <label class="selected">Reset password</label>
      <div></div>
    </div>
    <div>
      <form method="POST" autocomplete="on" id="resetPasswordForm">
        <div class="inputs">
          <div class="input">
            <input name="email" type="email" placeholder="Email" required>
            <img src="/img/user.svg" alt="email">
          </div>
          <div class="input">
            <input type="password" name="newPassword" id="newPassword" placeholder="New Password" required>
            <img src="/img/pass.svg" alt="new password">
            <i class="fas fa-eye toggle-password" id="toggleNewPassword"></i>
          </div>
          <div class="input">
            <input type="password" name="confirmNewPassword" id="confirmNewPassword" placeholder="Confirm New Password" required>
            <img src="/img/pass.svg" alt="confirm password">
            <i class="fas fa-eye toggle-password" id="toggleConfirmNewPassword"></i>
          </div>
        </div>
        <button type="submit" style="margin-bottom:10px">Change Password</button>
      </form>
    </div>
  </div>
</div>
<script src="/js/auth.js"></script>
</body>
</html>
