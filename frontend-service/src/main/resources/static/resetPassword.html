<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/img/logowhite.png" type="image/png"/>
  <link rel="stylesheet" type="text/css" href="/css/login.css">
  <title>Reset Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
<div class="align">
  <nav class="navbar">
    <div class="logo">
      <img src="/img/logowhite.png" alt="Store Logo">
    </div>
    <div class="site-name">
      <text>Please enter your email and the <br>new password to update your <br> account password. </text>
    </div>
  </nav>
  <div>
    <img src="/img/collage.jpg" alt="IT collage" class="Background-image">
  </div>
  <div class="card">
    <div class="head">
      <div></div>
      <label class="selected">Reset your password </label>
      <div></div>
    </div>
    <div>
      <form method="POST" autocomplete="on" id="resetPasswordForm">
        <div class="inputs">
          <div class="input">
            <input name="email" type="email" placeholder="Email" required>
            <img src="/img/user.svg">
          </div>
          <div class="input">
            <input type="password" name="newPassword" id="newPassword" placeholder="New Password" required>
            <img src="/img/pass.svg">
            <i class="fas fa-eye toggle-password" id="toggleNewPassword"></i>
          </div>
          <div class="input">
            <input type="password" name="confirmNewPassword" id="confirmNewPassword" placeholder="Confirm New Password" required>
            <img src="/img/pass.svg">
            <i class="fas fa-eye toggle-password" id="toggleConfirmNewPassword"></i>
          </div>
        </div>
        <button type="submit" style="margin-bottom:10px">Change</button>
      </form>
    </div>
  </div>
</div>
<script>
  const toggleNewPassword = document.querySelector('#toggleNewPassword');
  const newPassword = document.querySelector('#newPassword');
  const toggleConfirmNewPassword = document.querySelector('#toggleConfirmNewPassword');
  const confirmNewPassword = document.querySelector('#confirmNewPassword');

  toggleNewPassword.addEventListener('click', function() {
    const type = newPassword.getAttribute('type') === 'password' ? 'text' : 'password';
    newPassword.setAttribute('type', type);
    this.classList.toggle('fa-eye-slash');
  });

  toggleConfirmNewPassword.addEventListener('click', function() {
    const type = confirmNewPassword.getAttribute('type') === 'password' ? 'text' : 'password';
    confirmNewPassword.setAttribute('type', type);
    this.classList.toggle('fa-eye-slash');
  });

  document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);

    try {
      const gatewayUrl = localStorage.getItem('gatewayUrl') || `${window.location.protocol}//localhost:8765`;
      const response = await fetch(`${gatewayUrl}/user-service/api/auth/resetPassword`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({
              email: formData.get('email'),
              newPassword: formData.get('newPassword'),
              confirmNewPassword: formData.get('confirmNewPassword')
          })
      });

      const data = await response.json();

      if (response.ok) {
          alert('Password reset successful! Please login.');
          window.location.href = '/login.html';
      } else {
          alert(data.message || 'Reset failed');
      }
    } catch (error) {
      alert('Connection error. Please try again.');
      console.error(error);
    }
  });
</script>
</body>
