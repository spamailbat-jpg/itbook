<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/img/logowhite.png" type="image/png"/>
  <link rel="stylesheet" href="/css/login.css">
  <title>Create Account - ITBook</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body data-page="signup">
<div class="align">
  <nav class="navbar">
    <div class="logo"><img src="/img/logowhite.png" alt="Logo"></div>
    <div class="site-name"><b>[ ITBook ]</b><br><text>Create your account and start learning.</text></div>
  </nav>

  <div><img src="/img/collage.jpg" alt="IT collage" class="Background-image"></div>

  <div class="card">
    <div class="head">
      <div></div>
      <a href="/login.html">Login</a>
      <a class="selected" href="/signUp.html">Sign up</a>
      <div></div>
    </div>
    <div>
      <form class="formSignup" autocomplete="on">
        <div class="inputs">
          <div class="input">
            <input name="email" type="email" placeholder="Email" required>
            <img src="/img/icons/mail.svg" alt="mail">
          </div>
          <div class="input">
            <input name="fullName" placeholder="Full Name" required>
            <img src="/img/icons/user.svg" alt="user">
          </div>
          <div class="input">
            <input type="password" name="password" id="password" placeholder="Password" required>
            <img src="/img/icons/pass.svg" alt="password">
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
          <div class="input">
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm Password" required>
            <img src="/img/icons/pass.svg" alt="password">
            <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
          </div>

          <div class="password-requirements">
            <p id="req-length"><i class="fas fa-times-circle"></i> At least 8 characters</p>
            <p id="req-case"><i class="fas fa-times-circle"></i> Mix of uppercase and lowercase</p>
            <p id="req-symbols"><i class="fas fa-times-circle"></i> Include numbers and symbols</p>
          </div>
          <br>
        </div>
        <button type="submit" style="margin-bottom:10px">Create account</button>
      </form>
    </div>
  </div>
</div>
<script src="/js/auth.js"></script>
</body>
</html>
