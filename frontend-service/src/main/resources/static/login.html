<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/img/logowhite.png" type="image/png"/>
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <title>Login - ITBook</title>
</head>
<body data-page="login">
<div class="align">
  <nav class="navbar">
    <div class="logo"><img src="/img/logowhite.png" alt="Logo"></div>
    <div class="site-name-login"><b>[ ITBook ]</b><br><text>Welcome back. Continue your journey.</text></div>
  </nav>

  <div>
    <img src="/img/collage.jpg" alt="IT collage" class="Background-image">
  </div>

  <div class="card">
    <div class="head">
      <div></div>
      <a class="selected" href="/login.html">Login</a>
      <a href="/signUp.html">Sign up</a>
      <div></div>
    </div>
    <div>
      <form autocomplete="on" id="loginForm">
        <div class="inputs">
          <div class="input">
            <input name="email" type="email" placeholder="Email" required>
            <img src="/img/icons/mail.svg" alt="mail">
          </div>
          <div class="input">
            <input type="password" name="password" id="password" placeholder="Password" required>
            <img src="/img/icons/pass.svg" alt="password">
            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          </div>
          <a class="ff" href="/resetPassword.html">Forgot password?</a>
        </div>
        <button type="submit" style="margin-bottom:10px">Login</button>
      </form>
    </div>
  </div>
</div>
<script src="/js/auth.js"></script>
</body>
</html>
